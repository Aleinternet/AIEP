name: Importar cartera desde Google Drive

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/drive-import.yml"
      - "cloud/drive-sync/**"
      - "cloud/drive-sync-python/**"
  schedule:
    # GitHub usa UTC. Chile alterna UTC-3/UTC-4; el gate interno solo importa a las 08:00 America/Santiago.
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"

jobs:
  import-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verificar horario Chile
        id: schedule_gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_import=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          chile_hour="$(TZ=America/Santiago date +%H)"
          if [ "$chile_hour" = "08" ]; then
            echo "run_import=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Importacion omitida: en Chile no son las 08:00."
            echo "run_import=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Revisar credenciales disponibles
        if: steps.schedule_gate.outputs.run_import == 'true'
        id: preflight
        env:
          GOOGLE_DRIVE_AIEP_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_AIEP_FOLDER_ID || '1VzcG1kLr9noQR9UPvzRVZAU2peWwLe1i' }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL || 'aiep-drive@aiep-496715.iam.gserviceaccount.com' }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ready=true
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::notice::Importacion omitida: faltan secrets de Supabase."
            ready=false
          fi
          if [ -z "$GOOGLE_PRIVATE_KEY" ] && { [ -z "$GOOGLE_OAUTH_CLIENT_ID" ] || [ -z "$GOOGLE_OAUTH_CLIENT_SECRET" ] || [ -z "$GOOGLE_OAUTH_REFRESH_TOKEN" ]; }; then
            echo "::notice::Importacion omitida: falta GOOGLE_PRIVATE_KEY o el trio OAuth de Google Drive."
            ready=false
          fi
          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.schedule_gate.outputs.run_import == 'true' && steps.preflight.outputs.ready == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.schedule_gate.outputs.run_import == 'true' && steps.preflight.outputs.ready == 'true'
        run: python -m pip install -r cloud/drive-sync-python/requirements.txt

      - name: Probar acceso Drive
        if: steps.schedule_gate.outputs.run_import == 'true' && steps.preflight.outputs.ready == 'true'
        env:
          GOOGLE_DRIVE_AIEP_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_AIEP_FOLDER_ID || '1VzcG1kLr9noQR9UPvzRVZAU2peWwLe1i' }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL || 'aiep-drive@aiep-496715.iam.gserviceaccount.com' }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          python - <<'PY'
          import os
          import sys
          from google.auth.exceptions import RefreshError
          sys.path.insert(0, "cloud/drive-sync-python")
          from setup_drive import drive_service, ROOT_FOLDER_ID

          def test_drive():
              service = drive_service()
              return service.files().get(fileId=ROOT_FOLDER_ID, fields="id,name", supportsAllDrives=True).execute()

          try:
              folder = test_drive()
              print(f"OK Drive con OAuth/cuenta configurada: {folder['name']} ({folder['id']})")
          except RefreshError as exc:
              if "invalid_grant" not in str(exc):
                  raise
              if not os.getenv("GOOGLE_PRIVATE_KEY"):
                  raise RuntimeError(
                      "El GOOGLE_OAUTH_REFRESH_TOKEN esta vencido o revocado y no hay GOOGLE_PRIVATE_KEY para usar cuenta de servicio."
                  ) from exc
              print("::warning::GOOGLE_OAUTH_REFRESH_TOKEN vencido/revocado. Probando cuenta de servicio.")
              os.environ["GOOGLE_AUTH_MODE"] = "service_account"
              try:
                  folder = test_drive()
              except Exception as service_exc:
                  raise RuntimeError(
                      "OAuth fallo por invalid_grant y la cuenta de servicio tampoco pudo acceder. "
                      "Comparte la carpeta AIEP con aiep-drive@aiep-496715.iam.gserviceaccount.com "
                      "o regenera GOOGLE_OAUTH_REFRESH_TOKEN."
                  ) from service_exc
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
                  env_file.write("GOOGLE_AUTH_MODE=service_account\n")
              print(f"OK Drive con cuenta de servicio: {folder['name']} ({folder['id']})")
          PY

      - name: Probar acceso Supabase
        if: steps.schedule_gate.outputs.run_import == 'true' && steps.preflight.outputs.ready == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python - <<'PY'
          import os
          import requests
          url = os.environ["SUPABASE_URL"].rstrip("/") + "/rest/v1/debtors?select=*&limit=1"
          key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          response = requests.get(url, headers={"apikey": key, "Authorization": f"Bearer {key}"}, timeout=60)
          response.raise_for_status()
          PY

      - name: Importar archivos pendientes
        if: steps.schedule_gate.outputs.run_import == 'true' && steps.preflight.outputs.ready == 'true'
        env:
          GOOGLE_DRIVE_AIEP_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_AIEP_FOLDER_ID || '1VzcG1kLr9noQR9UPvzRVZAU2peWwLe1i' }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL || 'aiep-drive@aiep-496715.iam.gserviceaccount.com' }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python cloud/drive-sync-python/import_pending.py
